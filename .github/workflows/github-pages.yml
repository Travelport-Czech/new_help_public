name: github-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build moved notice
        run: |
          mkdir -p out
          cat > out/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta http-equiv="refresh" content="0; url=https://travelport-czech.github.io/gol_help_public/" />
            <link rel="canonical" href="https://travelport-czech.github.io/gol_help_public/" />
            <title>Moved to gol_help_public</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 4rem auto; padding: 0 1rem; line-height: 1.5; }
              a { color: #0b57d0; }
            </style>
          </head>
          <body>
            <h1>This help site has moved</h1>
            <p>Please use the active portal:</p>
            <p><a href="https://travelport-czech.github.io/gol_help_public/">https://travelport-czech.github.io/gol_help_public/</a></p>
            <p>Repository: <a href="https://github.com/Travelport-Czech/gol_help_public">Travelport-Czech/gol_help_public</a></p>
          </body>
          </html>
          EOF
          touch out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
